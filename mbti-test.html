<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 성격 유형 검사</title>
  <style>
    body {
      font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
      text-align: center;
      color: #333;
      line-height: 1.6;
    }
    h1 { color: #333; margin: 20px 0 10px; }
    p { color: #666; }
    button {
      background: #8B5A2B;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      margin: 20px;
    }
    button:hover { background: #A67B5B; }

    #quiz-screen {
      max-width: 720px;
      margin: 0 auto;
    }
    #progress {
      font-size: 18px;
      margin: 20px 0;
      color: #555;
    }
    #question-text {
      font-size: 22px;
      min-height: 100px;
      margin: 30px 0;
      padding: 0 20px;
      line-height: 1.4;
    }
    .option {
      display: block;
      background: white;
      border: 2px solid #ddd;
      margin: 12px auto;
      padding: 16px 20px;
      width: 85%;
      max-width: 540px;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
      transition: 0.2s;
    }
    .option:hover {
      border-color: #8B5A2B;
      background: #fffaf0;
    }

    #result-screen {
      max-width: 720px;
      margin: 0 auto;
    }
    #mbti-type {
      font-size: 56px;
      font-weight: bold;
      color: #8B5A2B;
      margin: 15px 0 10px;
      letter-spacing: 4px;
    }
    #description {
      font-size: 17.5px;
      text-align: left;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin: 20px auto;
      line-height: 1.75;
    }
    .analysis {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .strengths, .weaknesses {
      flex: 1;
      min-width: 300px;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: left;
    }
    .strengths h3 { color: #2E8B57; margin-top: 0; }
    .weaknesses h3 { color: #C0392B; margin-top: 0; }
    ul {
      padding-left: 20px;
      margin: 10px 0 0;
    }
    li {
      margin-bottom: 8px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- 시작 화면 -->
  <div id="start-screen">
    <h1>MBTI 성격 유형 검사</h1>
    <p>솔직하게 답변해주세요!<br>(총 20문항, 약 5~7분 소요)</p>
    <button onclick="startTest()">테스트 시작하기</button>
  </div>

  <!-- 질문 화면 -->
  <div id="quiz-screen" class="hidden">
    <div id="progress">질문 <span id="current">1</span> / <span id="total">20</span></div>
    <h2 id="question-text"></h2>
    <div id="options"></div>
  </div>

  <!-- 결과 화면 -->
  <div id="result-screen" class="hidden">
    <h1>당신의 MBTI 유형은</h1>
    <div id="mbti-type"></div>
    
    <div id="description"></div>

    <div class="analysis">
      <div class="strengths">
        <h3>✅ 강점</h3>
        <ul id="strength-list"></ul>
      </div>
      <div class="weaknesses">
        <h3>⚠️ 약점</h3>
        <ul id="weakness-list"></ul>
      </div>
    </div>

    <button onclick="restart()">다시 하기</button>
  </div>

  <script>
    let currentQuestion = 0;
    let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    const questions = [
      { q: "사람이 많은 파티나 모임에서 에너지를 얻는 편이다.", options: [{text:"매우 그렇다", score:{E:2}}, {text:"그렇다", score:{E:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{I:1}}, {text:"매우 아니다", score:{I:2}}]},
      { q: "혼자 조용히 있는 시간을 더 좋아한다.", options: [{text:"매우 그렇다", score:{I:2}}, {text:"그렇다", score:{I:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{E:1}}, {text:"매우 아니다", score:{E:2}}]},
      { q: "새로운 사람을 만나서 이야기 나누는 것을 즐긴다.", options: [{text:"매우 그렇다", score:{E:2}}, {text:"그렇다", score:{E:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{I:1}}, {text:"매우 아니다", score:{I:2}}]},
      { q: "현실적인 사실과 구체적인 경험을 중요하게 생각한다.", options: [{text:"매우 그렇다", score:{S:2}}, {text:"그렇다", score:{S:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{N:1}}, {text:"매우 아니다", score:{N:2}}]},
      { q: "미래의 가능성이나 새로운 아이디어를 상상하는 것을 좋아한다.", options: [{text:"매우 그렇다", score:{N:2}}, {text:"그렇다", score:{N:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{S:1}}, {text:"매우 아니다", score:{S:2}}]},
      { q: "단순하고 직관적인 설명보다 복잡하고 참신한 아이디어가 더 흥미롭다.", options: [{text:"매우 그렇다", score:{N:2}}, {text:"그렇다", score:{N:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{S:1}}, {text:"매우 아니다", score:{S:2}}]},
      { q: "결정을 내릴 때 논리와 객관적인 사실을 우선한다.", options: [{text:"매우 그렇다", score:{T:2}}, {text:"그렇다", score:{T:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{F:1}}, {text:"매우 아니다", score:{F:2}}]},
      { q: "타인의 감정과 상황을 먼저 고려해서 결정한다.", options: [{text:"매우 그렇다", score:{F:2}}, {text:"그렇다", score:{F:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{T:1}}, {text:"매우 아니다", score:{T:2}}]},
      { q: "논쟁에서 이기는 것보다 상대방의 기분을 맞춰주는 게 더 중요하다.", options: [{text:"매우 그렇다", score:{F:2}}, {text:"그렇다", score:{F:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{T:1}}, {text:"매우 아니다", score:{T:2}}]},
      { q: "계획을 세우고 그 계획대로 움직이는 것을 선호한다.", options: [{text:"매우 그렇다", score:{J:2}}, {text:"그렇다", score:{J:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{P:1}}, {text:"매우 아니다", score:{P:2}}]},
      { q: "즉흥적으로 유연하게 상황에 대처하는 것을 좋아한다.", options: [{text:"매우 그렇다", score:{P:2}}, {text:"그렇다", score:{P:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{J:1}}, {text:"매우 아니다", score:{J:2}}]},
      { q: "일정을 미리 짜두고 따르는 편이다.", options: [{text:"매우 그렇다", score:{J:2}}, {text:"그렇다", score:{J:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{P:1}}, {text:"매우 아니다", score:{P:2}}]},
      { q: "혼자서 조용히 산책하거나 생각하는 시간을 즐긴다.", options: [{text:"매우 그렇다", score:{I:2}}, {text:"그렇다", score:{I:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{E:1}}, {text:"매우 아니다", score:{E:2}}]},
      { q: "새로운 장소나 경험을 탐험하는 것을 좋아한다.", options: [{text:"매우 그렇다", score:{N:2}}, {text:"그렇다", score:{N:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{S:1}}, {text:"매우 아니다", score:{S:2}}]},
      { q: "친구가 힘들어할 때 공감하며 들어주는 편이다.", options: [{text:"매우 그렇다", score:{F:2}}, {text:"그렇다", score:{F:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{T:1}}, {text:"매우 아니다", score:{T:2}}]},
      { q: "마감 기한이 정해진 일을 미리미리 준비한다.", options: [{text:"매우 그렇다", score:{J:2}}, {text:"그렇다", score:{J:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{P:1}}, {text:"매우 아니다", score:{P:2}}]},
      { q: "사실에 기반한 논리적인 설명을 선호한다.", options: [{text:"매우 그렇다", score:{T:2}}, {text:"그렇다", score:{T:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{F:1}}, {text:"매우 아니다", score:{F:2}}]},
      { q: "현재 일어나는 일에 집중하기보다는 미래의 가능성을 생각한다.", options: [{text:"매우 그렇다", score:{N:2}}, {text:"그렇다", score:{N:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{S:1}}, {text:"매우 아니다", score:{S:2}}]},
      { q: "사람들과 함께하는 활동에서 활력을 얻는다.", options: [{text:"매우 그렇다", score:{E:2}}, {text:"그렇다", score:{E:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{I:1}}, {text:"매우 아니다", score:{I:2}}]},
      { q: "일상에서 세부적인 사실이나 숫자를 잘 기억하는 편이다.", options: [{text:"매우 그렇다", score:{S:2}}, {text:"그렇다", score:{S:1}}, {text:"보통이다", score:{}}, {text:"아니다", score:{N:1}}, {text:"매우 아니다", score:{N:2}}]}
    ];

    // 16개 유형 상세 설명 + 강점·약점 분석
    const typeData = {
      "ENFP": {
        desc: "활기차고 창의적인 **아이디어 뱅크**입니다. 새로운 사람, 새로운 경험을 좋아하며 긍정적인 에너지를 주변에 퍼뜨립니다. 자유롭고 열정적이며, 가능성을 보는 재능이 뛰어나지만, 때로는 마무리가 약할 수 있어요.",
        strengths: ["뛰어난 창의력과 아이디어 생성 능력", "사람을 끌어들이는 밝고 따뜻한 매력", "빠른 적응력과 긍정적인 에너지", "열정적으로 목표를 추구"],
        weaknesses: ["집중력과 마무리가 약한 편", "계획을 세우고 지키기 어려움", "감정 기복이 있을 수 있음", "현실적인 세부 사항을 놓치기 쉬움"]
      },
      "ENTP": {
        desc: "논쟁을 즐기고 지적 호기심이 강한 **발명가** 타입입니다. 빠른 사고와 유머 감각으로 주변을 즐겁게 하며, 새로운 아이디어를 끊임없이 만들어냅니다.",
        strengths: ["빠른 사고와 문제 해결 능력", "혁신적인 아이디어 창출", "유연하고 적응력이 강함", "유머와 설득력이 뛰어남"],
        weaknesses: ["지루한 일상이나 반복 업무에 약함", "약속이나 마무리를 잘 지키지 못함", "논쟁을 즐겨 관계가 어려울 수 있음"]
      },
      "ENFJ": {
        desc: "타인을 이끌고 공감하는 **따뜻한 리더**입니다. 사람들의 감정을 잘 읽고 조화로운 관계를 만들며, 공동의 목표를 위해 헌신합니다.",
        strengths: ["강한 공감 능력과 리더십", "사람을 동기부여하는 카리스마", "조직과 팀을 조화롭게 이끔", "미래 비전을 제시하는 능력"],
        weaknesses: ["타인의 의견을 너무 신경 씀", "자신의 필요를 뒤로 미루는 경향", "스트레스를 혼자 감당하려 함"]
      },
      "ENTJ": {
        desc: "대담하고 전략적인 **지도자**입니다. 명확한 목표를 세우고 효율적으로 달성하는 능력이 뛰어나며, 리더십이 강합니다.",
        strengths: ["강력한 리더십과 실행력", "장기적인 전략 수립 능력", "효율성과 생산성을 중시", "결단력이 뛰어남"],
        weaknesses: ["너무 직설적이고 완벽주의", "타인의 감정을 간과할 수 있음", "휴식과 여유를 놓치기 쉬움"]
      },
      "INFP": {
        desc: "이상과 가치를 중요하게 여기는 **이상주의자**입니다. 깊은 내면 세계를 가지고 있으며, 창의성과 공감 능력이 뛰어나요.",
        strengths: ["강한 가치관과 진정성", "뛰어난 창의력과 공감 능력", "유연하고 포용적인 태도", "의미 있는 일을 추구"],
        weaknesses: ["현실적인 실행력이 약함", "감정적으로 상처받기 쉬움", "결정 장애가 있을 수 있음"]
      },
      "INTP": {
        desc: "논리적이고 분석적인 **철학자** 타입입니다. 복잡한 문제를 깊이 파고들며, 독립적인 사고를 즐깁니다.",
        strengths: ["논리적 분석력과 문제 해결 능력", "독창적인 사고", "객관성과 지적 호기심", "지식을 빠르게 습득"],
        weaknesses: ["사회적 상호작용이 다소 서툴음", "감정 표현이 부족할 수 있음", "실제 실행보다는 이론에 머무름"]
      },
      "INFJ": {
        desc: "통찰력 있고 이상적인 **선지자** 타입입니다. 깊은 공감 능력과 미래를 내다보는 직관을 가지고 있으며, 사람들을 돕고 세상을 더 나은 곳으로 만들고 싶어합니다.",
        strengths: ["깊은 통찰력과 직관", "강한 공감 능력", "장기적인 비전 제시", "헌신적이고 이상을 추구"],
        weaknesses: ["완벽주의로 인한 스트레스", "타인의 감정을 너무 많이 짊어짐", "현실과 이상의 괴리"]

        weaknesses: ["장기적인 계획이 부족", "위험을 과소평가할 수 있음", "지루한 일에 약함"]
      },
      "ESFJ": {
        desc: "친절하고 책임감 있는 **보호자**입니다. 주변 사람들을 잘 챙기고, 조화로운 분위기를 만드는 데 탁월합니다.",
        strengths: ["강한 책임감과 배려심", "조화로운 관계 구축", "실용적이고 세심함", "팀워크를 중시"],
        weaknesses: ["변화에 다소 느림", "타인의 비판에 민감", "자신의 필요를 뒤로 미룸"]
      },
      "ESTJ": {
        desc: "실용적이고 단호한 **관리자** 타입입니다. 규칙과 질서를 중시하며, 효율적으로 일을 추진합니다.",
        strengths: ["강한 실행력과 조직력", "책임감과 리더십", "효율적인 관리 능력", "명확한 기준 제시"],
        weaknesses: ["너무 엄격하고 직설적", "변화와 유연성 부족", "감정적인 면을 간과"]
      },
      "ISFP": {
        desc: "부드럽고 예술적인 **예술가** 타입입니다. 조용한 가운데도 깊은 감수성을 가지고 있으며, 자신의 가치관에 따라 자유롭게 살아갑니다.",
        strengths: ["뛰어난 예술적 감수성", "부드럽고 따뜻한 성격", "현재를 즐기는 능력", "자유롭고 진정성 있음"],
        weaknesses: ["결정과 실행이 느림", "갈등 상황을 피하려 함", "장기 계획이 약함"]
      },
      "ISTP": {
        desc: "논리적이고 실용적인 **장인** 타입입니다. 손으로 무언가를 만드는 것을 좋아하고, 기계나 시스템을 분석하는 데 능숙합니다.",
        strengths: ["실용적 문제 해결 능력", "기계적·논리적 사고", "독립성과 침착함", "위기 대처 능력"],
        weaknesses: ["감정 표현이 서툴음", "장기 계획에 약함", "사회적 상황이 불편할 수 있음"]
      },
      "ISFJ": {
        desc: "헌신적이고 세심한 **수호자**입니다. 주변 사람들을 따뜻하게 돌보고, 약속과 책임을 중요하게 여깁니다.",
        strengths: ["강한 책임감과 충성심", "세심한 배려와 관찰력", "안정적이고 신뢰할 수 있음", "실용적 도움"],
        weaknesses: ["변화에 느리고 스트레스 받음", "자신의 필요를 표현하지 않음", "완벽주의 성향"]
      },
      "ISTJ": {
        desc: "성실하고 신뢰할 수 있는 **검사관** 타입입니다. 꼼꼼하고 체계적이며, 주어진 일을 책임감 있게 완수합니다.",
        strengths: ["꼼꼼하고 체계적인 성향", "강한 책임감과 신뢰성", "사실 기반의 현실적 판단", "꾸준한 노력"],
        weaknesses: ["변화와 새로운 시도에 보수적", "감정적인 유연성 부족", "너무 엄격할 수 있음"]
      }
    };

    function startTest() {
      document.getElementById("start-screen").classList.add("hidden");
      document.getElementById("quiz-screen").classList.remove("hidden");
      currentQuestion = 0;
      scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
      showQuestion();
    }

    function showQuestion() {
      if (currentQuestion >= questions.length) {
        showResult();
        return;
      }

      const q = questions[currentQuestion];
      document.getElementById("current").textContent = currentQuestion + 1;
      document.getElementById("total").textContent = questions.length;
      document.getElementById("question-text").textContent = q.q;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach(opt => {
        const div = document.createElement("div");
        div.className = "option";
        div.textContent = opt.text;
        div.onclick = () => selectAnswer(opt.score);
        optionsDiv.appendChild(div);
      });
    }

    function selectAnswer(scoreAdd) {
      Object.keys(scoreAdd).forEach(key => {
        scores[key] += scoreAdd[key];
      });

      currentQuestion++;
      showQuestion();
    }

    function showResult() {
      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.remove("hidden");

      const mbti = 
        (scores.E >= scores.I ? 'E' : 'I') +
        (scores.S >= scores.N ? 'S' : 'N') +
        (scores.T >= scores.F ? 'T' : 'F') +
        (scores.J >= scores.P ? 'J' : 'P');

      document.getElementById("mbti-type").textContent = mbti;

      const data = typeData[mbti];

      // 설명
      document.getElementById("description").innerHTML = `<strong>${mbti}</strong> - ${data.desc}`;

      // 강점 리스트
      const strengthList = document.getElementById("strength-list");
      strengthList.innerHTML = data.strengths.map(item => `<li>${item}</li>`).join("");

      // 약점 리스트
      const weaknessList = document.getElementById("weakness-list");
      weaknessList.innerHTML = data.weaknesses.map(item => `<li>${item}</li>`).join("");
    }

    function restart() {
      document.getElementById("result-screen").classList.add("hidden");
      document.getElementById("start-screen").classList.remove("hidden");
    }
  </script>
</body>
</html>
