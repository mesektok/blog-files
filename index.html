<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무료 자료 다운로드</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #1a73e8; }
        .download-btn {
            display: inline-block; padding: 14px 32px; background: #1a73e8; color: white;
            text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 17px;
            margin-top: 20px;
        }
        .download-btn:hover { background: #1557b0; }
        iframe { border: 1px solid #ddd; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>📄 무료 자료</h1>
    <p>아래 버튼을 클릭해 PDF를 다운로드하세요.</p>

    <!-- PC 버전 -->
    <h2>PC 홈화면 세팅 가이드</h2>
    <iframe src="네이버 블로그 PC 홈화면 세팅 가이드.pdf" width="100%" height="600px"></iframe>
    <a class="download-btn" href="네이버 블로그 PC 홈화면 세팅 가이드.pdf" download>
        📥 PC용 PDF 다운로드
    </a>

    <br><br>

    <!-- 모바일 버전 -->
    <h2>모바일 홈화면 세팅 가이드</h2>
    <iframe src="네이버 블로그 모바일 홈화면 세팅 가이드.pdf" width="100%" height="600px"></iframe>
    <a class="download-btn" href="네이버 블로그 모바일 홈화면 세팅 가이드.pdf" download>
        📥 모바일용 PDF 다운로드
    </a>
</body>
</html>
